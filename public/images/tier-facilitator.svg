<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Facilitator figure with megaphone -->
  <!-- Head -->
  <circle cx="90" cy="42" r="12" stroke="#f87171" stroke-width="1.5" fill="rgba(248,113,113,0.06)"/>

  <!-- Torso -->
  <path d="M82 54 L78 120" stroke="#f87171" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M98 54 L102 120" stroke="#f87171" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Shoulders -->
  <path d="M78 56 Q90 52 102 56" stroke="#f87171" stroke-width="1.5" fill="none"/>
  <!-- Chest line -->
  <path d="M80 70 L100 70" stroke="#f87171" stroke-width="0.8" opacity="0.3"/>
  <!-- Waist -->
  <path d="M80 100 L100 100" stroke="#f87171" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Left arm (holding megaphone base) -->
  <path d="M78 58 L64 76 L68 92" stroke="#f87171" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arm (raised, holding megaphone) -->
  <path d="M102 58 L118 64 L130 62" stroke="#f87171" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Megaphone -->
  <!-- Handle/grip -->
  <rect x="126" y="58" width="10" height="12" rx="2" stroke="#f87171" stroke-width="1.3" fill="rgba(248,113,113,0.06)"/>
  <!-- Cone -->
  <path d="M136 54 L168 38 L168 82 L136 70 Z" stroke="#f87171" stroke-width="1.4" fill="rgba(248,113,113,0.04)" stroke-linejoin="round"/>
  <!-- Megaphone bell rim -->
  <path d="M168 38 Q172 60 168 82" stroke="#f87171" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Inner detail -->
  <path d="M140 56 L140 68" stroke="#f87171" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>

  <!-- Sound waves -->
  <path d="M172 52 Q180 60 172 68" stroke="#f87171" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M178 46 Q190 60 178 74" stroke="#f87171" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M184 40 Q198 60 184 80" stroke="#f87171" stroke-width="0.8" fill="none" opacity="0.18" stroke-linecap="round"/>

  <!-- Legs -->
  <path d="M82 120 L78 160" stroke="#f87171" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M98 120 L102 160" stroke="#f87171" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M74 160 L82 160" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M98 160 L106 160" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Ground shadow -->
  <ellipse cx="90" cy="166" rx="24" ry="5" stroke="#f87171" stroke-width="0.8" fill="rgba(248,113,113,0.03)" stroke-dasharray="3 3" opacity="0.4"/>
</svg>
