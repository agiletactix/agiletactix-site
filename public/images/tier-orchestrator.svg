<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Conductor/Maestro figure -->
  <!-- Head -->
  <circle cx="100" cy="42" r="12" stroke="#22d3ee" stroke-width="1.5" fill="rgba(34,211,238,0.06)"/>

  <!-- Torso - tailcoat -->
  <path d="M92 54 L86 100 L78 130 L82 131 L90 105 L94 130 L100 130 L100 58 Z"
        stroke="#22d3ee" stroke-width="1.3" fill="rgba(34,211,238,0.04)" stroke-linejoin="round"/>
  <path d="M108 54 L114 100 L122 130 L118 131 L110 105 L106 130 L100 130 L100 58 Z"
        stroke="#22d3ee" stroke-width="1.3" fill="rgba(34,211,238,0.04)" stroke-linejoin="round"/>

  <!-- Shoulders -->
  <path d="M88 56 Q100 52 112 56" stroke="#22d3ee" stroke-width="1.5" fill="none"/>

  <!-- Left arm (lowered, slight angle) -->
  <path d="M88 58 L72 78 L68 96" stroke="#22d3ee" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left hand -->
  <circle cx="67" cy="98" r="3" stroke="#22d3ee" stroke-width="1.2" fill="rgba(34,211,238,0.08)"/>

  <!-- Right arm (raised, holding baton) -->
  <path d="M112 58 L128 52 L142 36" stroke="#22d3ee" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right hand -->
  <circle cx="143" cy="34" r="3" stroke="#22d3ee" stroke-width="1.2" fill="rgba(34,211,238,0.08)"/>

  <!-- Baton -->
  <line x1="140" y1="30" x2="158" y2="14" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Baton tip glow -->
  <circle cx="159" cy="13" r="3" fill="rgba(34,211,238,0.3)"/>
  <circle cx="159" cy="13" r="6" fill="rgba(34,211,238,0.08)"/>

  <!-- Legs -->
  <path d="M94 130 L90 164" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M106 130 L110 164" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M86 164 L94 164" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M106 164 L114 164" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Podium/platform -->
  <ellipse cx="100" cy="170" rx="28" ry="6" stroke="#22d3ee" stroke-width="1" fill="rgba(34,211,238,0.04)" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- Musical/energy arcs radiating from baton -->
  <path d="M152 22 Q160 18 164 24" stroke="#22d3ee" stroke-width="0.8" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M156 10 Q166 6 168 16" stroke="#22d3ee" stroke-width="0.8" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M148 8 Q154 2 162 6" stroke="#22d3ee" stroke-width="0.8" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Subtle orchestral waves (left side) -->
  <path d="M48 80 Q42 72 48 64" stroke="#22d3ee" stroke-width="0.7" fill="none" opacity="0.2" stroke-linecap="round"/>
  <path d="M42 84 Q34 74 42 62" stroke="#22d3ee" stroke-width="0.7" fill="none" opacity="0.12" stroke-linecap="round"/>
</svg>
