<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Builder figure with hard hat and wrench -->
  <!-- Hard hat -->
  <path d="M78 44 Q78 28 100 24 Q122 28 122 44" stroke="#60a5fa" stroke-width="1.5" fill="rgba(96,165,250,0.06)" stroke-linejoin="round"/>
  <!-- Hat brim -->
  <path d="M72 44 L128 44" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Hat band -->
  <path d="M82 38 L118 38" stroke="#60a5fa" stroke-width="0.8" opacity="0.4"/>
  <!-- Hat light/lamp -->
  <circle cx="100" cy="30" r="3" stroke="#60a5fa" stroke-width="1" fill="rgba(96,165,250,0.15)"/>

  <!-- Face/head (below hat) -->
  <path d="M86 44 L86 54 Q100 60 114 54 L114 44" stroke="#60a5fa" stroke-width="1.3" fill="none"/>

  <!-- Torso -->
  <path d="M84 58 L80 118" stroke="#60a5fa" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M116 58 L120 118" stroke="#60a5fa" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Shoulders -->
  <path d="M82 58 Q100 54 118 58" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <!-- Tool belt -->
  <path d="M82 104 L118 104" stroke="#60a5fa" stroke-width="1.2" fill="none"/>
  <rect x="94" y="104" width="6" height="8" rx="1" stroke="#60a5fa" stroke-width="0.8" fill="rgba(96,165,250,0.06)" opacity="0.6"/>
  <rect x="104" y="104" width="5" height="6" rx="1" stroke="#60a5fa" stroke-width="0.8" fill="rgba(96,165,250,0.06)" opacity="0.6"/>

  <!-- Left arm (carrying blueprint roll) -->
  <path d="M82 60 L62 80 L58 98" stroke="#60a5fa" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blueprint roll -->
  <rect x="44" y="82" width="20" height="6" rx="3" stroke="#60a5fa" stroke-width="1.2" fill="rgba(96,165,250,0.06)" transform="rotate(-15 54 85)"/>
  <path d="M48 90 L42 96" stroke="#60a5fa" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>

  <!-- Right arm (holding wrench) -->
  <path d="M118 60 L136 72 L140 90" stroke="#60a5fa" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wrench -->
  <path d="M138 86 L142 106" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M136 106 L148 106" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M136 106 Q134 112 138 114 Q142 112 148 106" stroke="#60a5fa" stroke-width="1.2" fill="rgba(96,165,250,0.06)"/>

  <!-- Legs (slightly wider stance) -->
  <path d="M86 118 L80 160" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M114 118 L120 160" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Boots -->
  <path d="M75 160 L86 160 L86 164 L75 164 Z" stroke="#60a5fa" stroke-width="1.2" fill="rgba(96,165,250,0.04)" stroke-linejoin="round"/>
  <path d="M114 160 L125 160 L125 164 L114 164 Z" stroke="#60a5fa" stroke-width="1.2" fill="rgba(96,165,250,0.04)" stroke-linejoin="round"/>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="170" rx="28" ry="5" stroke="#60a5fa" stroke-width="0.8" fill="rgba(96,165,250,0.03)" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- Subtle gear/cog (background element) -->
  <circle cx="160" cy="140" r="14" stroke="#60a5fa" stroke-width="0.6" fill="none" opacity="0.12"/>
  <circle cx="160" cy="140" r="8" stroke="#60a5fa" stroke-width="0.6" fill="none" opacity="0.12"/>
  <path d="M160 124 L160 128 M160 152 L160 156 M144 140 L148 140 M172 140 L176 140 M149 129 L152 132 M168 148 L171 151 M149 151 L152 148 M168 132 L171 129" stroke="#60a5fa" stroke-width="0.8" opacity="0.12" stroke-linecap="round"/>
</svg>
